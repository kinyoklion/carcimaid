name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: kinyoklion/synthase/action@v0
        id: release

  build:
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked -p carcimaid-cli

      - name: Package binary
        run: |
          mkdir -p dist
          tar -czf "dist/carcimaid-${{ needs.release.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz" \
            -C target/release carcimaid

      - name: Upload artifact to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release.outputs.tag_name }}" \
            dist/carcimaid-${{ needs.release.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz \
            --clobber

  publish:
    needs: [release, build]
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: kinyoklion/synthase/action@v0
        with:
          command: publish
          tag-name: ${{ needs.release.outputs.tag_name }}
